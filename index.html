<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI練習日記サイト</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#e0f4fb;--sky2:#b8e6f7;--sky3:#7bcde8;--sky4:#3aa8cc;--sky5:#1a7fa0;--sky-dark:#0d5f78;
  --r-md:8px;--r-lg:12px;
  --t1:#1a1a1a;--t2:#555;--t3:#999;
  --bg:#f0fafd;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}

/* ヘッダー */
header{background:#fff;border-bottom:0.5px solid var(--sky3);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;height:56px}
.site-title{font-size:18px;font-weight:500;color:var(--sky5);display:flex;align-items:center;gap:8px;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:8px}
.admin-badge{background:var(--sky3);color:#fff;font-size:11px;padding:3px 10px;border-radius:100px;display:none;align-items:center;gap:4px}
.admin-btn{background:transparent;border:0.5px solid var(--sky3);color:var(--sky5);padding:6px 12px;border-radius:var(--r-md);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px}
.admin-btn:hover{background:var(--sky)}

/* ナビゲーション */
nav{background:#fff;border-bottom:0.5px solid var(--sky2);display:flex;gap:0;padding:0 1rem}
.nav-tab{padding:10px 18px;font-size:14px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;display:flex;align-items:center;gap:6px;transition:color .15s}
.nav-tab:hover{color:var(--sky5)}
.nav-tab.active{color:var(--sky5);border-bottom-color:var(--sky4);font-weight:500}

/* ページ */
.page{display:none}
.page.active{display:block}
main{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}

/* 日記ページ 3カラム */
.diary-layout{display:grid;grid-template-columns:200px 1fr 200px;gap:1.25rem;align-items:start}
@media(max-width:900px){.diary-layout{grid-template-columns:1fr}.sidebar-left,.sidebar-right{display:none}}

/* 左サイドバー：猫 */
.sidebar-left{position:sticky;top:72px}
.cat-card{background:#fff;border:0.5px solid var(--sky2);border-radius:var(--r-lg);overflow:hidden;text-align:center}
.cat-img-wrap{width:100%;aspect-ratio:1/1;overflow:hidden;background:var(--sky);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.cat-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.cat-placeholder{color:var(--sky3);font-size:48px;display:flex;flex-direction:column;align-items:center;gap:6px}
.cat-placeholder span{font-size:11px;color:var(--t3)}
.cat-img-wrap:hover .cat-overlay{opacity:1}
.cat-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;color:#fff;font-size:12px;gap:4px}
.cat-info{padding:10px 12px}
.cat-name{font-size:14px;font-weight:500;color:var(--sky5);margin-bottom:2px}
.cat-desc{font-size:11px;color:var(--t3);line-height:1.5}
.cat-file-input{display:none}

/* 右サイドバー：アーカイブ */
.sidebar-right{position:sticky;top:72px;display:flex;flex-direction:column;gap:1rem}
.archive-card{background:#fff;border:0.5px solid var(--sky2);border-radius:var(--r-lg);padding:1rem}
.archive-title{font-size:13px;font-weight:500;color:var(--sky5);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.archive-list{display:flex;flex-direction:column;gap:2px}
.archive-item{padding:6px 8px;border-radius:var(--r-md);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:6px;transition:background .12s}
.archive-item:hover{background:var(--sky)}
.archive-item.active-month{background:var(--sky);font-weight:500}
.archive-month{font-size:13px;color:var(--t2)}
.archive-item.active-month .archive-month{color:var(--sky5)}
.archive-count{font-size:11px;color:var(--t3);background:var(--sky2);padding:1px 7px;border-radius:100px}

/* 閲覧カード */
.visitor-card{background:#fff;border:0.5px solid var(--sky2);border-radius:var(--r-lg);padding:1rem}
.visitor-welcome{font-size:13px;font-weight:500;color:var(--sky5);text-align:center;margin-bottom:10px;line-height:1.5}
.visitor-welcome em{font-style:normal;font-size:18px;color:var(--sky4);display:block}
.visitor-stats{display:flex;flex-direction:column;gap:6px}
.visitor-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:var(--sky);border-radius:var(--r-md);font-size:12px}
.visitor-row-label{color:var(--t3);display:flex;align-items:center;gap:4px}
.visitor-row-val{color:var(--sky5);font-weight:500}

/* ページング */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:1rem;padding-bottom:1rem}
.page-btn{background:#fff;border:0.5px solid var(--sky2);color:var(--t2);border-radius:var(--r-md);padding:6px 12px;font-size:13px;cursor:pointer;min-width:36px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.page-btn:hover{background:var(--sky);border-color:var(--sky3);color:var(--sky5)}
.page-btn.active{background:var(--sky4);border-color:var(--sky4);color:#fff;font-weight:500}
.page-btn:disabled{opacity:.4;cursor:not-allowed;background:#fff}

/* 検索・フィルターバー */
.search-bar{background:#fff;border:0.5px solid var(--sky2);border-radius:var(--r-lg);padding:1rem 1.25rem;margin-bottom:1.25rem}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-input-wrap{flex:1;position:relative}
.search-input-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--sky4);font-size:16px;pointer-events:none}
.search-input{width:100%;border:0.5px solid var(--sky2);border-radius:var(--r-md);padding:8px 10px 8px 34px;font-size:14px;background:#fff;color:var(--t1);font-family:inherit}
.search-input:focus{outline:none;border-color:var(--sky3)}
.search-clear{background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:6px 10px;border-radius:var(--r-md);white-space:nowrap}
.search-clear:hover{color:var(--sky5);background:var(--sky)}
.tag-filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag-filter-label{font-size:12px;color:var(--t3);white-space:nowrap}
.tag-chip{background:var(--sky);border:0.5px solid var(--sky2);color:var(--sky-dark);font-size:12px;padding:3px 10px;border-radius:100px;cursor:pointer;transition:background .12s}
.tag-chip:hover{background:var(--sky2)}
.tag-chip.active{background:var(--sky4);border-color:var(--sky4);color:#fff}
.result-count{font-size:12px;color:var(--t3);margin-bottom:10px}
.result-count strong{color:var(--sky5)}

/* 新規投稿ボタン */
.new-post-btn{width:100%;background:var(--sky4);color:#fff;border:none;border-radius:var(--r-lg);padding:11px;font-size:15px;cursor:pointer;margin-bottom:1.25rem;display:none;align-items:center;justify-content:center;gap:8px}
.new-post-btn:hover{background:var(--sky5)}

/* 記事カード */
.post-card{background:#fff;border:0.5px solid var(--sky2);border-radius:var(--r-lg);padding:1.25rem 1.5rem;margin-bottom:1rem}
.post-meta{font-size:12px;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.post-tag{background:var(--sky);color:var(--sky-dark);font-size:11px;padding:2px 8px;border-radius:100px;cursor:pointer}
.post-tag:hover{background:var(--sky2)}
.post-title{font-size:17px;font-weight:500;margin-bottom:8px;color:var(--t1)}
.post-body{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:12px}
.highlight{background:#fff3b0;border-radius:2px;padding:0 1px}
.post-img{width:100%;max-height:220px;object-fit:cover;border-radius:var(--r-md);margin-bottom:12px}
.reactions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.reaction-btn{background:var(--sky);border:0.5px solid var(--sky2);border-radius:100px;padding:4px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--sky-dark);transition:background .15s}
.reaction-btn:hover{background:var(--sky2)}
.reaction-btn.active{background:var(--sky3);border-color:var(--sky3);color:#fff}
.comment-section{border-top:0.5px solid var(--sky);padding-top:10px;margin-top:4px}
.comment-toggle{background:transparent;border:none;font-size:12px;color:var(--sky4);cursor:pointer;display:flex;align-items:center;gap:4px;padding:0}
.comment-toggle:hover{color:var(--sky5)}
.comments-list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.comment-item{background:var(--sky);border-radius:var(--r-md);padding:8px 12px;font-size:13px;color:var(--t2)}
.comment-meta{font-size:11px;color:var(--t3);margin-bottom:2px}
.comment-form{display:flex;gap:6px;margin-top:8px}
.comment-input{flex:1;border:0.5px solid var(--sky2);border-radius:var(--r-md);padding:7px 10px;font-size:13px;background:#fff;color:var(--t1);font-family:inherit}
.comment-input:focus{outline:none;border-color:var(--sky3)}
.comment-submit{background:var(--sky4);border:none;color:#fff;border-radius:var(--r-md);padding:7px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.comment-submit:hover{background:var(--sky5)}
.admin-delete{background:transparent;border:none;color:#ccc;font-size:11px;cursor:pointer;margin-left:auto;display:none;align-items:center;gap:4px;padding:2px 6px;border-radius:var(--r-md)}
.admin-delete:hover{color:#e24b4a;background:#fff0f0}
.empty-state{text-align:center;padding:4rem 1rem;color:var(--t3);font-size:14px}
.empty-state i{font-size:36px;color:var(--sky3);display:block;margin-bottom:10px}

/* 分析ページ */
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:#fff;border:0.5px solid var(--sky2);border-radius:var(--r-lg);padding:1rem 1.25rem}
.stat-label{font-size:12px;color:var(--t3);margin-bottom:4px}
.stat-value{font-size:26px;font-weight:500;color:var(--sky5)}
.stat-sub{font-size:12px;color:var(--t3);margin-top:2px}
.chart-card{background:#fff;border:0.5px solid var(--sky2);border-radius:var(--r-lg);padding:1.25rem 1.5rem;margin-bottom:1rem}
.chart-title{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.chart-wrap{position:relative;height:240px}
.tag-rank-list{display:flex;flex-direction:column;gap:8px}
.tag-rank-row{display:flex;align-items:center;gap:10px}
.tag-rank-name{font-size:13px;color:var(--sky-dark);background:var(--sky);padding:2px 10px;border-radius:100px;white-space:nowrap;min-width:80px;text-align:center}
.tag-rank-bar-wrap{flex:1;height:8px;background:var(--sky);border-radius:100px;overflow:hidden}
.tag-rank-bar{height:100%;background:var(--sky4);border-radius:100px;transition:width .4s}
.tag-rank-count{font-size:12px;color:var(--t3);white-space:nowrap;min-width:28px;text-align:right}
.reaction-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.reaction-stat{background:var(--sky);border-radius:var(--r-md);padding:10px;text-align:center}
.reaction-emoji{font-size:22px;margin-bottom:4px}
.reaction-count{font-size:18px;font-weight:500;color:var(--sky5)}
.reaction-name{font-size:11px;color:var(--t3)}

/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--r-lg);padding:1.5rem;width:min(520px,94vw);max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;color:var(--sky5);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;color:var(--t2);display:block;margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;border:0.5px solid var(--sky2);border-radius:var(--r-md);padding:8px 10px;font-size:14px;background:#fff;color:var(--t1);font-family:inherit}
.form-group textarea{resize:vertical;min-height:100px}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--sky3)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-cancel{background:transparent;border:0.5px solid var(--sky2);color:var(--t2);border-radius:var(--r-md);padding:7px 16px;cursor:pointer;font-size:14px;font-family:inherit}
.btn-cancel:hover{background:#f5f5f5}
.btn-primary{background:var(--sky4);border:none;color:#fff;border-radius:var(--r-md);padding:7px 16px;cursor:pointer;font-size:14px;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{background:var(--sky5)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed}

/* パスワードモーダル */
.pw-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200}
.pw-modal{background:#fff;border-radius:var(--r-lg);padding:1.5rem;width:min(300px,90vw)}
.pw-modal h2{font-size:15px;font-weight:500;color:var(--sky5);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pw-modal input{width:100%;border:0.5px solid var(--sky2);border-radius:var(--r-md);padding:8px 10px;font-size:14px;margin-bottom:8px;font-family:inherit}
.pw-modal input:focus{outline:none;border-color:var(--sky3)}
.pw-error{font-size:12px;color:#e24b4a;margin-bottom:8px;display:none}
.pw-actions{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>

<!-- パスワードモーダル -->
<div id="pw-modal" class="pw-modal-bg" style="display:none">
  <div class="pw-modal">
    <h2><i class="ti ti-lock"></i> 管理者認証</h2>
    <input type="password" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="pw-error" id="pw-error">パスワードが違います</div>
    <div class="pw-actions">
      <button class="btn-cancel" onclick="closePwModal()">キャンセル</button>
      <button class="btn-primary" onclick="checkPw()">ログイン</button>
    </div>
  </div>
</div>

<!-- 投稿モーダル -->
<div id="post-modal" class="modal-bg">
  <div class="modal">
    <div class="modal-title"><i class="ti ti-pencil"></i> 新しい記事を投稿</div>
    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="new-title" placeholder="記事タイトル">
    </div>
    <div class="form-group">
      <label>カテゴリ・タグ</label>
      <input type="text" id="new-tag" placeholder="例：ChatGPT、画像生成、プロンプト">
    </div>
    <div class="form-group">
      <label>本文</label>
      <textarea id="new-body" placeholder="今日の練習内容を書こう..."></textarea>
    </div>
    <div class="form-group">
      <label>画像（任意）</label>
      <label id="img-upload-label" style="display:flex;align-items:center;gap:8px;cursor:pointer;border:0.5px dashed var(--sky3);border-radius:var(--r-md);padding:10px 14px;color:var(--sky5);font-size:13px;background:var(--sky)">
        <i class="ti ti-photo-up" style="font-size:18px"></i>
        <span id="img-upload-text">クリックして画像を選択</span>
        <input type="file" id="new-img-file" accept="image/*" style="display:none" onchange="handleImgSelect(event)">
      </label>
      <div id="img-preview-wrap" style="display:none;margin-top:8px;position:relative">
        <img id="img-preview" src="" alt="" style="width:100%;max-height:180px;object-fit:cover;border-radius:var(--r-md)">
        <button onclick="clearImg()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);border:none;color:#fff;border-radius:50%;width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="ti ti-x" style="font-size:13px"></i></button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePostModal()">キャンセル</button>
      <button class="btn-primary" onclick="submitPost()">
        <i class="ti ti-send"></i> 投稿する
      </button>
    </div>
  </div>
</div>

<!-- ヘッダー -->
<header>
  <div class="site-title"><i class="ti ti-notebook"></i> AI練習日記サイト</div>
  <div class="header-right">
    <span id="admin-badge" class="admin-badge"><i class="ti ti-shield-check" style="font-size:12px"></i> 管理者モード</span>
    <button class="admin-btn" id="admin-toggle-btn" onclick="toggleAdmin()">
      <i class="ti ti-lock"></i> 管理者ログイン
    </button>
  </div>
</header>

<!-- ナビゲーション -->
<nav>
  <button class="nav-tab active" id="tab-diary" onclick="showPage('diary')">
    <i class="ti ti-book"></i> 日記
  </button>
  <button class="nav-tab" id="tab-analytics" onclick="showPage('analytics')">
    <i class="ti ti-chart-bar"></i> 分析
  </button>
</nav>

<!-- 日記ページ -->
<div class="page active" id="page-diary">
  <main>
    <button class="new-post-btn" id="new-post-btn" onclick="openPostModal()">
      <i class="ti ti-plus"></i> 新しい記事を書く
    </button>
    <div class="diary-layout">
      <!-- 左：猫サイドバー -->
      <div class="sidebar-left">
        <div class="cat-card">
          <div class="cat-img-wrap" onclick="document.getElementById('cat-file-input').click()">
            <div class="cat-placeholder" id="cat-placeholder">
              <i class="ti ti-cat"></i>
              <span>写真を追加</span>
            </div>
            <img id="cat-img" src="" alt="猫" style="display:none">
            <div class="cat-overlay"><i class="ti ti-camera"></i> 変更</div>
          </div>
          <input type="file" id="cat-file-input" class="cat-file-input" accept="image/*,.heic,.heif" onchange="handleCatImg(event)">
          <div class="cat-info">
            <div class="cat-name">うちの猫</div>
            <div class="cat-desc">AI練習日記を見守る相棒</div>
          </div>
        </div>
      </div>

      <!-- 中央：記事一覧 -->
      <div>
        <!-- 検索・フィルター -->
        <div class="search-bar">
          <div class="search-row">
            <div class="search-input-wrap">
              <i class="ti ti-search"></i>
              <input class="search-input" id="search-input" type="text" placeholder="タイトル・本文をキーワード検索..." oninput="applyFilters()">
            </div>
            <button class="search-clear" onclick="clearFilters()"><i class="ti ti-x" style="font-size:13px"></i> クリア</button>
          </div>
          <div class="tag-filters">
            <span class="tag-filter-label"><i class="ti ti-tag" style="font-size:13px"></i> タグ：</span>
            <div id="tag-filter-chips"></div>
          </div>
        </div>
        <div class="result-count" id="result-count"></div>
        <div id="posts-container"></div>
        <div id="pagination" class="pagination"></div>
      </div>

      <!-- 右：閲覧情報＋アーカイブ -->
      <div class="sidebar-right">
        <!-- 閲覧カード -->
        <div class="visitor-card">
          <div class="visitor-welcome" id="visitor-welcome"></div>
          <div class="visitor-stats">
            <div class="visitor-row">
              <span class="visitor-row-label"><i class="ti ti-calendar" style="font-size:12px"></i> 今日の閲覧</span>
              <span class="visitor-row-val" id="today-count">-</span>
            </div>
            <div class="visitor-row">
              <span class="visitor-row-label"><i class="ti ti-history" style="font-size:12px"></i> 累計閲覧</span>
              <span class="visitor-row-val" id="total-count">-</span>
            </div>
          </div>
        </div>
        <!-- アーカイブ -->
        <div class="archive-card">
          <div class="archive-title"><i class="ti ti-archive"></i> アーカイブ</div>
          <div class="archive-list" id="archive-list"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 分析ページ -->
<div class="page" id="page-analytics">
  <main>
    <div class="analytics-grid" id="stat-cards"></div>
    <div class="chart-card">
      <div class="chart-title"><i class="ti ti-tag"></i> タグ別投稿数</div>
      <div class="tag-rank-list" id="tag-rank-list"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
      <div class="chart-card" style="margin-bottom:0">
        <div class="chart-title"><i class="ti ti-calendar-stats"></i> 月別投稿数</div>

      </div>
      <div class="chart-card" style="margin-bottom:0">
        <div class="chart-title"><i class="ti ti-heart"></i> リアクション合計</div>

    </div>
  </main>
</div>

<script>
const ADMIN_PW = "diary2024";
const POSTS_PER_PAGE = 5;
let isAdmin = false;

// 閲覧カウント（localStorage）
function initVisitorCount() {
  const todayKey = 'visits_' + new Date().toISOString().slice(0,10); // "visits_2025-06-25"
  const totalKey = 'visits_total';

  // 累計カウントアップ
  const total = parseInt(localStorage.getItem(totalKey) || '0') + 1;
  localStorage.setItem(totalKey, total);

  // 今日のカウントアップ
  const today = parseInt(localStorage.getItem(todayKey) || '0') + 1;
  localStorage.setItem(todayKey, today);

  // 表示
  const welcomeEl = document.getElementById('visitor-welcome');
  const todayEl   = document.getElementById('today-count');
  const totalEl   = document.getElementById('total-count');

  const suffixes = ['', '👏', '🎉', '✨', '🌟', '🎊'];
  const suffix = total <= 1 ? '！はじめまして👋' : suffixes[Math.min(Math.floor((total-1)/10), suffixes.length-1)] || '';

  if (welcomeEl) welcomeEl.innerHTML =
    `<em>あなたは ${total} 人目</em>のお客様です${suffix}`;
  if (todayEl)  todayEl.textContent  = today + ' 回';
  if (totalEl)  totalEl.textContent  = total + ' 回';
}
let openComments = {};
let userReactions = {};
let nextId = 3;
let selectedImgBase64 = "";
let activeTag = "";
let activeMonth = "";   // "YYYY/MM" 形式、空なら全件
let searchQuery = "";
let currentPage = 1;
let monthlyChart = null;

let posts = [
  {id:1,date:"2025年6月25日",dateObj:new Date(2025,5,25),tag:"Claude",title:"Claudeでプロンプト設計を練習してみた",body:"今日はAI練習の一環として、Claudeへの指示の出し方を試行錯誤。XMLタグを使うと構造が明確になることがわかった。ヘッダーや箇条書きよりも、用途によって使い分けが大事だと実感。",img:"",reactions:{like:3,heart:2,helpful:5,fire:1},comments:[{author:"ゲスト",text:"参考になりました！",date:"6/25"}],aiComment:"プロンプト設計の試行錯誤、とても丁寧に取り組んでいますね。XMLタグで構造化するアプローチは、特に長い指示や複数の要素を含む場合に効果を発揮します。「用途によって使い分ける」という気づきは重要で、シンプルな質問には不要、複雑なタスクには有効、という判断ができるようになると実践力がぐっと上がります。"},
  {id:2,date:"2025年6月20日",dateObj:new Date(2025,5,20),tag:"画像生成",title:"画像生成AIで水彩風イラストを作ってみた",body:"Stable Diffusionを使って水彩風のイラスト生成に挑戦。プロンプトに「watercolor」「soft」などを加えると雰囲気が変わることを発見した。ネガティブプロンプトも重要。",img:"",reactions:{like:7,heart:4,helpful:2,fire:3},comments:[],aiComment:"watercolorやsoftといったスタイルキーワードの効果に気づいたのは素晴らしいです！画像生成では「何を描くか」だけでなく「どう描くか」を指定するスタイルワードが仕上がりを大きく左右します。次のステップとしてはCFG scaleやsampling stepsの調整も試してみると、さらに表現の幅が広がりますよ。"},
  {id:3,date:"2025年5月30日",dateObj:new Date(2025,4,30),tag:"Claude",title:"Claude Codeを使ってPythonスクリプトを自動生成",body:"Claude Codeを初めて触ってみた。CSVを読み込んでグラフを出力するスクリプトを自然言語で指示するだけで完成した。コードの説明もしてくれるのでとても勉強になる。",img:"",reactions:{like:5,heart:3,helpful:8,fire:2},comments:[],aiComment:"Claude Codeでの自動生成、素晴らしい第一歩ですね！自然言語でコードを指示するだけでなく、生成されたコードを読んで理解しようとする姿勢が学習効果を高めます。次は生成されたコードを少し改変してみると、AIとの共同作業感覚が身についてきますよ。"},
  {id:4,date:"2025年5月10日",dateObj:new Date(2025,4,10),tag:"プロンプト",title:"Few-shotプロンプトで文体を統一する実験",body:"Few-shotプロンプトで出力の文体を揃える実験をした。例文を3つ与えると安定した出力が得られることがわかった。1つだけだとブレが大きい。",img:"",reactions:{like:4,heart:1,helpful:6,fire:0},comments:[],aiComment:"Few-shotの実験結果の記録、とても体系的です。例文の数と出力の安定性の関係を実験で確かめたのは素晴らしいアプローチ。次のステップとして、例文の多様性（似た例vs異なる例）も比較してみると、さらに深い知見が得られると思います。"},
  {id:5,date:"2025年4月15日",dateObj:new Date(2025,3,15),tag:"画像生成",title:"LoRAファインチューニングを初めて試した",body:"Stable DiffusionのLoRAを使ってオリジナルキャラクターのスタイルを学習させた。学習画像は20枚で十分だった。ステップ数は1000くらいが丁度いい感じ。",img:"",reactions:{like:9,heart:6,helpful:4,fire:5},comments:[],aiComment:"LoRAのファインチューニング、上級者への大きな一歩ですね！20枚・1000ステップという具体的な数値を記録しておくのはとても大切です。次は学習率やデータのクオリティによる差異も記録すると、自分だけのベストプラクティスが蓄積されていきますよ。"}
];

// ページ切り替え
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'analytics') renderAnalytics();
}

// 検索・フィルター
function applyFilters() {
  searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
  currentPage = 1;
  renderPosts();
}

function setTagFilter(tag) {
  activeTag = (activeTag === tag) ? "" : tag;
  currentPage = 1;
  applyFilters();
}

function setMonthFilter(ym) {
  activeMonth = (activeMonth === ym) ? "" : ym;
  currentPage = 1;
  renderPosts();
}

function clearFilters() {
  searchQuery = "";
  activeTag = "";
  activeMonth = "";
  currentPage = 1;
  document.getElementById('search-input').value = "";
  renderPosts();
}

function getFilteredPosts() {
  return posts.slice().reverse().filter(p => {
    const matchTag = !activeTag || p.tag === activeTag;
    const q = searchQuery;
    const matchSearch = !q ||
      p.title.toLowerCase().includes(q) ||
      p.body.toLowerCase().includes(q) ||
      (p.tag && p.tag.toLowerCase().includes(q));
    const matchMonth = !activeMonth || (() => {
      const d = p.dateObj || new Date();
      const ym = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0');
      return ym === activeMonth;
    })();
    return matchTag && matchSearch && matchMonth;
  });
}

function getArchiveMap() {
  const map = {};
  posts.forEach(p => {
    const d = p.dateObj || new Date();
    const ym = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0');
    map[ym] = (map[ym]||0) + 1;
  });
  return map;
}

function renderArchive() {
  const el = document.getElementById('archive-list');
  if (!el) return;
  const map = getArchiveMap();
  const sorted = Object.keys(map).sort().reverse();
  if (sorted.length === 0) { el.innerHTML = '<div style="font-size:12px;color:var(--t3)">まだ投稿がありません</div>'; return; }
  el.innerHTML = sorted.map(ym => {
    const [y, m] = ym.split('/');
    const label = y + '年' + parseInt(m) + '月';
    const isActive = activeMonth === ym;
    return `<div class="archive-item${isActive?' active-month':''}" onclick="setMonthFilter('${ym}')">
      <span class="archive-month">${label}</span>
      <span class="archive-count">${map[ym]}</span>
    </div>`;
  }).join('');
}

function renderPagination(total) {
  const el = document.getElementById('pagination');
  if (!el) return;
  const totalPages = Math.ceil(total / POSTS_PER_PAGE);
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}><i class="ti ti-chevron-left"></i></button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (totalPages > 7 && i > 2 && i < totalPages-1 && Math.abs(i-currentPage) > 1) {
      if (i === 3 || i === totalPages-2) html += `<span style="color:var(--t3);padding:0 4px">…</span>`;
      continue;
    }
    html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}><i class="ti ti-chevron-right"></i></button>`;
  el.innerHTML = html;
}

function goPage(n) {
  const filtered = getFilteredPosts();
  const totalPages = Math.ceil(filtered.length / POSTS_PER_PAGE);
  if (n < 1 || n > totalPages) return;
  currentPage = n;
  renderPosts();
  document.getElementById('posts-container')?.scrollIntoView({behavior:'smooth',block:'start'});
}

function highlightText(text, query) {
  if (!query) return escHtml(text);
  const escaped = escHtml(text);
  const re = new RegExp('(' + escHtml(query).replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escaped.replace(re, '<mark class="highlight">$1</mark>');
}

function getAllTags() {
  const tags = {};
  posts.forEach(p => { if (p.tag) tags[p.tag] = (tags[p.tag]||0)+1; });
  return tags;
}

function renderTagChips() {
  const tags = getAllTags();
  const wrap = document.getElementById('tag-filter-chips');
  if (!wrap) return;
  wrap.innerHTML = Object.entries(tags)
    .sort((a,b) => b[1]-a[1])
    .map(([tag]) => `<button class="tag-chip ${activeTag===tag?'active':''}" onclick="setTagFilter('${escHtml(tag)}')">${escHtml(tag)}</button>`)
    .join('');
}

// 記事一覧描画
function renderPosts() {
  const newPostBtn = document.getElementById('new-post-btn');
  if (newPostBtn) newPostBtn.style.display = isAdmin ? 'flex' : 'none';

  renderTagChips();

  const filtered = getFilteredPosts();
  const countEl = document.getElementById('result-count');
  if (countEl) {
    if (searchQuery || activeTag) {
      countEl.innerHTML = `<strong>${filtered.length}</strong> 件 / 全 ${posts.length} 件`;
    } else {
      countEl.textContent = '';
    }
  }

  const container = document.getElementById('posts-container');
  if (!container) return;
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="ti ti-search-off"></i>条件に一致する記事がありません</div>';
    return;
  }

  container.innerHTML = filtered.map(p => `
    <div class="post-card">
      <div class="post-meta">
        <i class="ti ti-calendar" style="font-size:12px"></i>${p.date}
        ${p.tag ? `<span class="post-tag" onclick="setTagFilter('${escHtml(p.tag)}')" title="このタグで絞り込む">${escHtml(p.tag)}</span>` : ''}
        ${isAdmin ? `<button class="admin-delete" style="display:inline-flex" onclick="deletePost(${p.id})"><i class="ti ti-trash"></i> 削除</button>` : ''}
      </div>
      <div class="post-title">${highlightText(p.title, searchQuery)}</div>
      ${p.img ? `<img class="post-img" src="${p.img}" alt="" onerror="this.style.display='none'">` : ''}
      <div class="post-body">${highlightText(p.body, searchQuery)}</div>
      ${p.aiComment ? `<div class="ai-comment-box"><div class="ai-comment-label"><i class="ti ti-robot"></i> AIからのコメント</div>${escHtml(p.aiComment)}</div>` : ''}
      ${p.aiComment ? `<div class="ai-comment-box"><div class="ai-comment-label"><i class="ti ti-robot"></i> AIからのコメント</div>${escHtml(p.aiComment)}</div>` : ''}
      <div class="reactions">
        ${[['like','👍'],['heart','❤️'],['helpful','😊'],['fire','🔥']].map(([type,emoji]) => {
          const active = userReactions[`${p.id}_${type}`] ? 'active' : '';
          return `<button class="reaction-btn ${active}" onclick="react(${p.id},'${type}')">${emoji} <span>${p.reactions[type]}</span></button>`;
        }).join('')}
      </div>
      <div class="comment-section">
        <button class="comment-toggle" onclick="toggleComments(${p.id})">
          <i class="ti ti-message-circle" style="font-size:13px"></i>
          コメント ${p.comments.length}件 を${openComments[p.id]?'隠す':'見る'}
        </button>
        ${openComments[p.id] ? `
          <div class="comments-list">
            ${p.comments.length===0
              ? '<div style="font-size:12px;color:#999;margin-top:6px">まだコメントはありません</div>'
              : p.comments.map(c=>`<div class="comment-item"><div class="comment-meta">${escHtml(c.author)} · ${escHtml(c.date)}</div>${escHtml(c.text)}</div>`).join('')}
          </div>
          <div class="comment-form">
            <input class="comment-input" id="ci-${p.id}" placeholder="コメントを入力..." maxlength="200" onkeydown="if(event.key==='Enter')submitComment(${p.id})">
            <button class="comment-submit" onclick="submitComment(${p.id})">送信</button>
          </div>` : ''}
      </div>
    </div>
  `).join('');
}

// 分析ページ描画
function renderAnalytics() {
  const totalPosts = posts.length;
  const totalReactions = posts.reduce((s,p)=>s+p.reactions.like+p.reactions.heart+p.reactions.helpful+p.reactions.fire,0);
  const totalComments = posts.reduce((s,p)=>s+p.comments.length,0);
  const tags = getAllTags();
  const tagCount = Object.keys(tags).length;

  // サマリーカード
  document.getElementById('stat-cards').innerHTML = [
    ['ti-notebook','投稿数',totalPosts,'件',''],
    ['ti-heart','総リアクション',totalReactions,'回',''],
    ['ti-message-circle','総コメント',totalComments,'件',''],
    ['ti-tag','タグ種類',tagCount,'種類',''],
  ].map(([icon,label,val,unit]) => `
    <div class="stat-card">
      <div class="stat-label"><i class="ti ${icon}" style="font-size:13px"></i> ${label}</div>
      <div class="stat-value">${val}</div>
      <div class="stat-sub">${unit}</div>
    </div>`).join('');

  // タグ別バーチャート
  const sortedTags = Object.entries(tags).sort((a,b)=>b[1]-a[1]);
  const maxTagCount = sortedTags[0]?.[1] || 1;
  document.getElementById('tag-rank-list').innerHTML = sortedTags.length === 0
    ? '<div style="color:#999;font-size:13px">タグがありません</div>'
    : sortedTags.map(([tag,count]) => `
      <div class="tag-rank-row">
        <span class="tag-rank-name">${escHtml(tag)}</span>
        <div class="tag-rank-bar-wrap"><div class="tag-rank-bar" style="width:${Math.round(count/maxTagCount*100)}%"></div></div>
        <span class="tag-rank-count">${count}件</span>
      </div>`).join('');

  // 月別投稿数チャート
  const monthMap = {};
  posts.forEach(p => {
    const d = p.dateObj || new Date();
    const key = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
    monthMap[key] = (monthMap[key]||0)+1;
  });
  const sortedMonths = Object.keys(monthMap).sort();
  const monthLabels = sortedMonths.map(m => {
    const [y,mo] = m.split('/');
    return `${y}年${parseInt(mo)}月`;
  });
  const monthData = sortedMonths.map(m => monthMap[m]);

  if (monthlyChart) { monthlyChart.destroy(); monthlyChart = null; }
  const ctx = document.getElementById('chart-monthly');
  if (ctx) {
    monthlyChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [{
          data: monthData,
          backgroundColor: '#7bcde8',
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1, color: '#999', font:{size:11} }, grid: { color:'#f0f0f0' } },
          x: { ticks: { color: '#999', font:{size:11} }, grid: { display:false } }
        }
      }
    });
  }

  // リアクション合計
  const rTotals = {like:0,heart:0,helpful:0,fire:0};
  posts.forEach(p=>{ rTotals.like+=p.reactions.like; rTotals.heart+=p.reactions.heart; rTotals.helpful+=p.reactions.helpful; rTotals.fire+=p.reactions.fire; });
  document.getElementById('reaction-totals').innerHTML = [
    ['👍','いいね',rTotals.like],
    ['❤️','ハート',rTotals.heart],
    ['😊','参考になった',rTotals.helpful],
    ['🔥','すごい',rTotals.fire],
  ].map(([emoji,name,count]) => `
    <div class="reaction-stat">
      <div class="reaction-emoji">${emoji}</div>
      <div class="reaction-count">${count}</div>
      <div class="reaction-name">${name}</div>
    </div>`).join('');

  // 人気記事トップ3
  const ranked = posts.slice().sort((a,b)=>{
    const sa = a.reactions.like+a.reactions.heart+a.reactions.helpful+a.reactions.fire;
    const sb = b.reactions.like+b.reactions.heart+b.reactions.helpful+b.reactions.fire;
    return sb-sa;
  }).slice(0,3);
  document.getElementById('top-posts').innerHTML = ranked.map((p,i) => {
    const total = p.reactions.like+p.reactions.heart+p.reactions.helpful+p.reactions.fire;
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;${i<ranked.length-1?'border-bottom:0.5px solid var(--sky2)':''}">
      <span style="font-size:20px;min-width:28px;text-align:center">${['🥇','🥈','🥉'][i]}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(p.title)}</div>
        <div style="font-size:12px;color:var(--t3);margin-top:2px">${p.date}${p.tag?` · ${escHtml(p.tag)}`:''}</div>
      </div>
      <span style="font-size:13px;color:var(--sky5);font-weight:500;white-space:nowrap">リアクション ${total}</span>
    </div>`;
  }).join('');
}

// リアクション
function react(postId, type) {
  const k = `${postId}_${type}`;
  const p = posts.find(x=>x.id===postId);
  if (!p) return;
  if (userReactions[k]) { p.reactions[type]--; delete userReactions[k]; }
  else { p.reactions[type]++; userReactions[k]=true; }
  renderPosts();
}

// コメント
function toggleComments(postId) {
  openComments[postId]=!openComments[postId];
  renderPosts();
}
function submitComment(postId) {
  const input=document.getElementById(`ci-${postId}`);
  const text=(input?input.value:'').trim();
  if(!text)return;
  const p=posts.find(x=>x.id===postId);
  if(!p)return;
  const now=new Date();
  p.comments.push({author:"ゲスト",text,date:`${now.getMonth()+1}/${now.getDate()}`});
  openComments[postId]=true;
  renderPosts();
}

// 削除
function deletePost(postId) {
  if(!confirm("この記事を削除しますか？"))return;
  posts=posts.filter(p=>p.id!==postId);
  renderPosts();
}

// 管理者
function toggleAdmin() {
  if (isAdmin) {
    isAdmin=false;
    document.getElementById('admin-badge').style.display='none';
    document.getElementById('admin-toggle-btn').innerHTML='<i class="ti ti-lock"></i> 管理者ログイン';
    renderPosts();

    document.getElementById('pw-modal').style.display='flex';

}

  document.getElementById('pw-modal').style.display='none';
  document.getElementById('pw-input').value='';
  document.getElementById('pw-error').style.display='none';
}
function checkPw() {
  if(document.getElementById('pw-input').value===ADMIN_PW){
    isAdmin=true;
    closePwModal();
    document.getElementById('admin-badge').style.display='inline-flex';

  } else {
    document.getElementById('pw-error').style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

// 猫画像（HEIC/HEIF対応）
async function handleCatImg(event) {
  const file = event.target.files[0];
  if (!file) return;

  const isHeic = file.type === 'image/heic' || file.type === 'image/heif'
    || file.name.toLowerCase().endsWith('.heic')
    || file.name.toLowerCase().endsWith('.heif');

  function showCatImg(src) {
    const img = document.getElementById('cat-img');
    const placeholder = document.getElementById('cat-placeholder');
    if (img) { img.src = src; img.style.display = 'block'; }
    if (placeholder) placeholder.style.display = 'none';
  }

  if (isHeic) {
    // heic2any ライブラリを動的ロードしてJPEGに変換
    if (!window.heic2any) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('heic2anyの読み込みに失敗しました'));
        document.head.appendChild(s);
      });
    }
    try {
      const blob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.85 });
      const url = URL.createObjectURL(blob);
      showCatImg(url);
    } catch(e) {
      alert('HEICの変換に失敗しました。JPEGやPNGに変換してからお試しください。');
    }
  } else {
    const reader = new FileReader();
    reader.onload = e => showCatImg(e.target.result);
    reader.readAsDataURL(file);
  }
}

// 記事画像
function handleImgSelect(event) {
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    selectedImgBase64=e.target.result;
    document.getElementById('img-preview').src=selectedImgBase64;
    document.getElementById('img-preview-wrap').style.display='block';
    document.getElementById('img-upload-text').textContent=file.name;
  };
  reader.readAsDataURL(file);
}
function clearImg() {
  selectedImgBase64='';
  document.getElementById('new-img-file').value='';
  document.getElementById('img-preview').src='';
  document.getElementById('img-preview-wrap').style.display='none';
  document.getElementById('img-upload-text').textContent='クリックして画像を選択';
}

// 投稿モーダル
function openPostModal() {
  document.getElementById('post-modal').classList.add('open');
}
function closePostModal() {
  document.getElementById('post-modal').classList.remove('open');
  ['new-title','new-tag','new-body'].forEach(id=>{ document.getElementById(id).value=''; });
  clearImg();
}

function submitPost() {
  const title=document.getElementById('new-title').value.trim();
  const body=document.getElementById('new-body').value.trim();
  if(!title||!body){alert("タイトルと本文は必須です");return;}
  const tag=document.getElementById('new-tag').value.trim();
  const now=new Date();
  const date=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  posts.push({id:nextId++,date,dateObj:now,tag,title,body,img:selectedImgBase64,reactions:{like:0,heart:0,helpful:0,fire:0},comments:[],aiComment:""});
  currentPage = 1;
  closePostModal();
  renderPosts();
}

// XSSエスケープ
function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

renderPosts();
initVisitorCount();
</script>
